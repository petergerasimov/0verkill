<!doctype html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>0verkill</title>
<style>
  /*
   * Full-page black background. The canvas keeps the intrinsic
   * aspect ratio of its drawing buffer (set by SDL_CreateWindow on
   * the C side); max-width/height: 100vw/100vh + width/height: auto
   * makes the browser scale it to fit the page while preserving
   * that ratio (letterbox/pillarbox is just empty body background).
   * The flex container centers it in the page.
   */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas {
    display: block;
    background: #000;
    outline: none;
    border: 0;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    /* Keep crisp pixels when scaled up by CSS rather than blurring. */
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<script>
  var Module = {
    canvas: (function () {
      var c = document.getElementById('canvas');
      c.addEventListener('webglcontextlost', function (e) {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);
      return c;
    })(),
    print: function () {
      return function () {
        var msg = Array.prototype.slice.call(arguments).join(' ');
        console.log(msg);
      };
    }(),
    printErr: function () {
      var msg = Array.prototype.slice.call(arguments).join(' ');
      console.error(msg);
    },
  };
  window.onerror = function () {
    console.error('Exception thrown, see JavaScript console');
  };
</script>
<script async src="index.js"></script>
</body>
</html>
